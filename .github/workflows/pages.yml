name: Deploy Landing Page to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['landing.html', 'index.html', 'sitemap.xml', 'robots.txt']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync pages to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp landing.html /tmp/site_index.html
          cp index.html /tmp/site_app.html
          cp sitemap.xml /tmp/site_sitemap.xml
          cp robots.txt /tmp/site_robots.txt
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/site_index.html index.html
          cp /tmp/site_app.html app.html
          cp /tmp/site_sitemap.xml sitemap.xml
          cp /tmp/site_robots.txt robots.txt
          git add index.html app.html sitemap.xml robots.txt
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "chore: sync pages from main [skip ci]"
            git push origin gh-pages
          fi
